[default]
# Only measure library code — excludes main.rs binary
packages = ["roxy"]
exclude-files = ["main\\.rs$", "benches/", "tests/"]
skip-clean = true
# Engine: llvm for accuracy
engine = "llvm"
# Only run lib tests (excludes binary/main.rs from coverage)
command = "test"
run-types = ["Lib"]

# Output formats
out = ["stdout", "html"]
output-dir = "target/tarpaulin"

# Skip unreachable and test-only code
ignore-tests = true
